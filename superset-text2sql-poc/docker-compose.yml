version: "3.8"

services:
  superset:
    image: apache/superset:latest
    container_name: superset
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=supersecret_poc_key_change_in_prod
      - TALISMAN_ENABLED=false
      - SUPERSET_CONFIG_PATH=/app/pythonpath/superset_config.py
    volumes:
      - ./demo_transport.db:/app/demo_transport.db
      - ./superset_config.py:/app/pythonpath/superset_config.py
      - superset_home:/app/superset_home
    command: >
      sh -c "
        superset db upgrade &&
        superset fab create-admin --username admin --firstname Admin --lastname User --email admin@example.com --password admin 2>/dev/null || true &&
        superset init &&
        superset run -h 0.0.0.0 -p 8088
      "

volumes:
  superset_home:
